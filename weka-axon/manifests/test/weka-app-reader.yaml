apiVersion: v1
kind: Pod
metadata:
  name: weka-axon-app-reader
  namespace: weka-axon-test
spec:
  nodeSelector:
    weka.io/supports-clients: "true"
  tolerations:
    - key: "weka.io/axon"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  containers:
    - name: reader
      image: busybox:1.36
      command:
        - sh
        - -lc
        - |
          set -eux
          echo "Reading data written by another pod:"
          cat /data/hello.txt
          sleep 3600
      volumeMounts:
        - name: weka-vol
          mountPath: /data
  volumes:
    - name: weka-vol
      persistentVolumeClaim:
        claimName: pvc-wekafs-dir
