# Helm values for WEKA Operator
# The controller-manager runs on system nodes (no special config needed).
# The node-agent DaemonSet is restricted to axon nodes via nodeSelector + tolerations.

nodeAgent:
  nodeSelector:
    weka.io/supports-backends: "true"
  tolerations:
    - key: "weka.io/axon"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
