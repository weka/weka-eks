apiVersion: v1
kind: Pod
metadata:
  name: weka-pvc-test
  namespace: weka-test
spec:
  nodeSelector:
    weka.io/supports-clients: "true"
  tolerations:
    - key: "weka.io/client"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  containers:
  - name: test-container
    image: busybox:1.37.0
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi
    volumeMounts:
    - name: weka-volume
      mountPath: "/data"
    command: ["sh", "-c", "echo 'Hello from WEKA!' > /data/hello.txt && ls -la /data && sleep 3600"]
  volumes:
  - name: weka-volume
    persistentVolumeClaim:
      claimName: pvc-wekafs-dir
