apiVersion: weka.weka.io/v1alpha1
kind: WekaClient
metadata:
  name: weka-client-hyperpod-udp
  namespace: weka-operator
spec:
  image: quay.io/weka.io/weka-in-container:4.4.10.183
  imagePullSecret: quay-weka-secret
  driversDistService: "https://drivers.weka.io"
  portRange:
    basePort: 46000
  nodeSelector:
    sagemaker.amazonaws.com/compute-type: hyperpod
    weka.io/supports-clients-hyperpod: "true"
    workload-type: weka-client
  joinIpPorts:
    - "10.0.67.13:14000"
    - "10.0.64.107:14000"
  hugepages: 3072
  network:
    udpMode: true
