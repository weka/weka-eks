apiVersion: v1
kind: ConfigMap
metadata:
  name: hugepages-config
  namespace: kube-system
data:
  configure-hugepages.sh: |
    #!/bin/sh
    set -e

    HUGEPAGES_COUNT="1536"

    # Configure hugepages
    echo "Configuring hugepages to $HUGEPAGES_COUNT..."
    echo "$HUGEPAGES_COUNT" > /host/sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages

    # Create systemd service for persistence
    cat > /host/etc/systemd/system/hugepages.service <<'SYSTEMD_EOF'
    [Unit]
    Description=Configure Hugepages for WEKA
    Before=kubelet.service

    [Service]
    Type=oneshot
    ExecStart=/bin/sh -c 'echo "1536" > /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages'
    RemainAfterExit=yes

    [Install]
    WantedBy=multi-user.target
    SYSTEMD_EOF

    # Enable the service using nsenter to access host systemd
    nsenter -t 1 -m -u -n -i systemctl daemon-reload
    nsenter -t 1 -m -u -n -i systemctl enable hugepages.service
    nsenter -t 1 -m -u -n -i systemctl start hugepages.service

    echo "Hugepages configured successfully: $(cat /host/sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages) pages"

    # Restart kubelet so Kubernetes recognizes the hugepages
    echo "Restarting kubelet to recognize hugepages..."
    nsenter -t 1 -m -u -n -i systemctl restart kubelet

    echo "Kubelet restarted. Hugepages should now be visible to Kubernetes."

    # Keep container running
    sleep infinity

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hugepages-configurator
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: hugepages-configurator
  template:
    metadata:
      labels:
        app: hugepages-configurator
    spec:
      nodeSelector:
        weka.io/supports-clients: "true"
      hostPID: true
      hostIPC: true
      containers:
      - name: configurator
        image: busybox:latest
        command: ["sh", "/scripts/configure-hugepages.sh"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: sys
          mountPath: /host/sys
        - name: etc
          mountPath: /host/etc
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: etc
        hostPath:
          path: /etc
          type: Directory
      - name: scripts
        configMap:
          name: hugepages-config
          defaultMode: 0755
      tolerations:
      - operator: Exists
