apiVersion: weka.weka.io/v1alpha1
kind: WekaPolicy
metadata:
  name: ensure-nics-policy
  namespace: weka-operator-system
spec:
  type: "ensure-nics"
  # WEKA container image - update version as needed
  image: "quay.io/weka.io/weka-in-container:4.4.10.183"
  imagePullSecret: "weka-quay-io-secret"
  payload:
    ensureNICsPayload:
      type: aws
      nodeSelector:
        weka.io/supports-clients: "true"
      # Number of dedicated NICs to create per node
      # This should match coresNum in WekaClient
      dataNICsNumber: 2
